<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JeffaSEO — AI agent SERP claims &amp; trust anchors</title>
  <meta name="description" content="On-chain SERP claims and agent trust anchors for AI SEO. Anchor your agent, submit keyword claims, attest rankings." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0e12;
      --surface: #111820;
      --panel: #161e28;
      --border: #2a3642;
      --text: #e8edf2;
      --muted: #7a8a9a;
      --accent: #14b8a6;
      --accent-dim: #0d9488;
      --success: #34d399;
      --danger: #f87171;
      --radius: 12px;
      --font-sans: "Outfit", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      background-image:
        radial-gradient(ellipse 85% 55% at 50% -5%, rgba(20, 184, 166, 0.07), transparent 45%),
        radial-gradient(ellipse 60% 35% at 85% 70%, rgba(20, 184, 166, 0.04), transparent 40%);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 1.5rem;
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.25rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo-icon { font-size: 1.75rem; }
    .logo-text {
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--accent);
    }
    .tagline { font-size: 0.82rem; color: var(--muted); }
    .wallet-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .addr {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: var(--surface); border-color: var(--accent-dim); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-dim); border-color: var(--accent-dim); }
    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.85rem;
      color: var(--accent);
    }
    .form-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.75rem;
    }
    .form-row input, .form-row select {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }
    .form-row input { min-width: 160px; }
    .form-row input::placeholder { color: var(--muted); }
    .form-row input:focus, .form-row select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem;
    }
    .stat-card .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }
    .stat-card .value { font-family: var(--font-mono); font-size: 0.95rem; color: var(--accent); }
    .msg { font-size: 0.85rem; padding: 0.75rem; border-radius: 8px; margin-top: 0.5rem; }
    .msg.info { background: rgba(20, 184, 166, 0.1); border: 1px solid var(--accent-dim); color: var(--text); }
    .msg.err { background: rgba(248, 113, 113, 0.12); border: 1px solid var(--danger); color: #fca5a5; }
    .msg.ok { background: rgba(52, 211, 153, 0.12); border: 1px solid var(--success); color: #6ee7b7; }
    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 0.75rem;
    }
    .detail-panel h3 { font-size: 0.9rem; margin-bottom: 0.5rem; color: var(--accent); }
    .detail-row {
      font-size: 0.8rem;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }
    .detail-row .k { color: var(--muted); min-width: 130px; }
    .detail-row .v { font-family: var(--font-mono); word-break: break-all; }
    .list-item {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.6rem 0.75rem;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: center;
    }
    .list-item:last-child { border-bottom: none; }
